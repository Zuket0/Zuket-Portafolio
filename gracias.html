<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Gracias por escribir!</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="icon" href="/static/res/ZuketIcon.png">
    
    <style>
        :root {
            --bg-dark: #1c1c1c; 
            --text-main: #f8fafc;
            --accent-purple: #7c3aed; 
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Plus Jakarta Sans', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            text-align: center;
        }

        .thanks-container {
            padding: 20px;
            max-width: 500px;
        }

        .icon-circle {
            width: 80px;
            height: 80px;
            background: rgba(124, 58, 237, 0.1);
            border: 2px solid var(--accent-purple);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px auto;
            font-size: 2rem;
            color: var(--accent-purple);
        }

        h1 { font-size: 2.5rem; font-weight: 800; margin-bottom: 15px; }
        p { color: #94a3b8; font-size: 1.1rem; line-height: 1.6; margin-bottom: 30px; }

        .btn-back {
            background-color: var(--accent-purple);
            color: white;
            padding: 12px 30px;
            border-radius: 8px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s ease;
            display: inline-block;
        }

        .btn-back:hover {
            transform: translateY(-3px);
            box-shadow: 0 4px 15px rgba(124, 58, 237, 0.4);
            color: white;
        }
    </style>
</head>
<body>

    <div class="thanks-container">
        <div class="icon-circle">
            <i class="fa-solid fa-check"></i>
        </div>
        <h1>¡Mensaje enviado!</h1>
        <p>He recibido tu correo correctamente. Me pondré en contacto contigo lo antes posible para conversar sobre tu propuesta o consulta.</p>
        <a href="index.html" class="btn-back">
            <i class="fa-solid fa-arrow-left"></i> Volver al inicio
        </a>
    </div>

</body>
</html>
